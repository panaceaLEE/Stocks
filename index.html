<!DOCTYPE html>
<html lang="ko"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;font-size:14px}
@media(prefers-color-scheme:dark){:root{--bg:#1a1a1a;--bg2:#252525;--tx:#e8e8e8;--tx2:#888;--bd:rgba(255,255,255,.1);--bds:rgba(255,255,255,.2)}}
@media(prefers-color-scheme:light){:root{--bg:#fff;--bg2:#f4f4f4;--tx:#111;--tx2:#666;--bd:rgba(0,0,0,.1);--bds:rgba(0,0,0,.2)}}
body{background:var(--bg);color:var(--tx)}
.w{padding:6px 10px}
.tabs{display:flex;gap:4px;margin-bottom:0}
.tab{padding:5px 12px;cursor:pointer;font-size:12px;color:var(--tx2);background:none;border:none;border-bottom:2px solid transparent;font-weight:400}
.tab.on{color:var(--tx);border-bottom-color:var(--tx);font-weight:500}
.mg{display:flex;gap:3px;margin-bottom:4px;overflow-x:auto;scrollbar-width:none;flex-wrap:nowrap}.mg::-webkit-scrollbar{display:none}
.mc{background:var(--bg2);border-radius:5px;padding:2px 8px;flex-shrink:0}
.mc.dim{opacity:.3;transition:opacity .2s}
.ml{font-size:8px;color:var(--tx2);margin-bottom:0}
.mv{font-size:12px;font-weight:500;white-space:nowrap}.mv.s{font-size:11px}
.tr{display:flex;gap:3px;margin-bottom:4px;flex-wrap:nowrap;overflow-x:auto;scrollbar-width:none;align-items:center;padding-bottom:1px}.tr::-webkit-scrollbar{display:none}
.tr .lb{font-size:11px;color:var(--tx2);margin-right:2px}
.db{padding:3px 10px;border-radius:20px;font-size:12px;cursor:pointer;font-weight:500;border:1px solid var(--tx);background:var(--tx);color:var(--bg);transition:all .15s}
.db.off{border-color:var(--bd);background:var(--bg2);color:var(--tx2);text-decoration:line-through}
.db.all{border-color:var(--bd);background:transparent;color:var(--tx2);font-weight:400;text-decoration:none}
.sg{display:grid;grid-template-columns:1fr 128px 1fr;gap:8px;margin-bottom:8px}
.si{position:relative;display:flex;align-items:center}
.si .lb{position:absolute;left:10px;font-size:11px;color:var(--tx2);font-weight:500;pointer-events:none;z-index:1}
.si input,.si select{width:100%;padding:7px 10px 7px 40px;border-radius:6px;border:1px solid var(--bds);background:var(--bg);color:var(--tx);font-size:13px;outline:none;-webkit-appearance:none}
.ft{display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap;align-items:center}
.ftag{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:20px;font-size:12px;background:var(--bg2);border:1px solid var(--bds)}
.ftag button{background:none;border:none;cursor:pointer;font-size:14px;color:var(--tx2);line-height:1;padding:0 0 0 2px}
.cb{padding:3px 12px;border-radius:20px;font-size:12px;background:transparent;border:1px solid var(--bds);cursor:pointer;color:var(--tx2)}
.tw{border:1px solid var(--bd);border-radius:10px;overflow:hidden;max-height:calc(100vh - 160px);display:flex;flex-direction:column}
.twi{overflow:auto;flex:1}
table{width:100%;border-collapse:separate;border-spacing:0;table-layout:fixed;min-width:560px}
thead tr{background:var(--bg2)}
th{padding:4px 8px;border-bottom:1px solid var(--bd);font-weight:500;font-size:11px;color:var(--tx2);background:var(--bg2);white-space:nowrap;position:sticky;top:0;z-index:10;overflow:hidden;text-overflow:ellipsis}
th.r{text-align:right}th.l{text-align:left}
.sum-row th{top:26px;z-index:9;border-bottom:2px solid var(--bd)}
td{padding:3px 8px;border-bottom:1px solid rgba(128,128,128,.08);font-size:12px}
td.r{text-align:right}td.l{text-align:left}td.sm{font-size:11px}td.mu{color:var(--tx2)}
.st{display:block;background:var(--bg2);padding:2px 7px;border-radius:4px;color:var(--tx2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sb{background:var(--bg2);padding:2px 6px;border-radius:4px}
.bdg{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:500}
.bdg.up{background:#EAF3DE;color:#3B6D11}.bdg.dn{background:#FCEBEB;color:#A32D2D}.bdg.nc{background:var(--bg2);color:var(--tx2)}
.rh{position:absolute;right:0;top:0;bottom:0;width:5px;cursor:col-resize;z-index:20}
.rh:hover,.rh.drag{background:rgba(128,128,128,.3)}
.more{text-align:center;padding:10px;font-size:12px;color:var(--tx2);border-top:1px solid var(--bd);background:var(--bg)}
.chip{padding:4px 10px;border-radius:20px;font-size:11px;cursor:pointer;border:1px solid var(--bds);background:transparent;color:var(--tx2)}
.chat{display:flex;flex-direction:column;gap:10px;min-height:200px;max-height:340px;overflow-y:auto;padding:12px;background:var(--bg2);border-radius:8px;margin-bottom:12px}
.msg{max-width:85%;padding:10px 14px;border-radius:10px;font-size:13px;line-height:1.6}
.msg.u{align-self:flex-end;background:var(--tx);color:var(--bg)}
.msg.ai{align-self:flex-start;background:var(--bg);border:1px solid var(--bd)}



@media print{body{background:#fff!important;color:#000!important;font-size:11px}#root{display:none!important}#print-view{display:block!important}}
#print-view{display:none;font-family:'Malgun Gothic',sans-serif;font-size:11px;color:#000;padding:12px}
#print-view .ph{display:flex;justify-content:space-between;align-items:center;border-bottom:2px solid #000;padding-bottom:6px;margin-bottom:10px}
#print-view .ph h2{font-size:15px;font-weight:700;margin:0}
#print-view .ph span{font-size:10px;color:#444}
#print-view table{width:100%;border-collapse:collapse;font-size:10px}
#print-view th{background:#1a1a2e;color:#fff;padding:5px 6px;text-align:right;border:1px solid #aaa;font-weight:600;white-space:nowrap}
#print-view th.l{text-align:left}
#print-view td{padding:4px 6px;border:1px solid #ddd;text-align:right}
#print-view td.l{text-align:left}
#print-view tr:nth-child(even){background:#f5f5f5}
#print-view tr.grp td{font-weight:700;border-top:1px solid #999;background:#eef}
#print-view .order-badge{display:inline-block;background:#D4A017;color:#fff;border-radius:3px;padding:1px 5px;font-size:9px;font-weight:700;margin-right:4px}
#print-view .footer{margin-top:10px;font-size:9px;color:#666;text-align:right;border-top:1px solid #ccc;padding-top:4px}

.brow::-webkit-scrollbar{display:none}

/* 행 그라데이션 가독성 */
.tw tbody tr:nth-child(even){background:linear-gradient(90deg,rgba(255,255,255,.018) 0%,transparent 60%)!important}
.tw tbody tr:nth-child(odd){background:linear-gradient(90deg,rgba(0,0,0,.06) 0%,transparent 60%)!important}
.tw tbody tr.grp-start td:first-child{border-left:2px solid rgba(59,109,17,.4)}
</style></head><body>

const TODAY=new Date();
function orderAlert(code){
  const p=BUY_PAT[code];

  const last=new Date(p.last);
  const nextOrder=new Date(last.getTime()+(p.cycle-28)*24*60*60*1000);
  return nextOrder<=TODAY;
}

function App(){
  const [tab,setTab]=useState("inv");

  function toggleHideBase(id){const s=new Set(hiddenBase);s.has(id)?s.delete(id):s.add(id);localStorage.setItem("inv_hidden_base",JSON.stringify([...s]));setHiddenBase(new Set(s));}
  function deleteExtraDate(id){
    const updated=extraDates.filter(e=>e.id!==id);
    localStorage.setItem("inv_extra",JSON.stringify(updated));setExtraDates(updated);
    if(!BASE_DATES.includes(id)){
      setVis(v=>{const nv={...v};delete nv[id];localStorage.setItem("inv_vis",JSON.stringify(nv));return nv;});

  }

      setVis(v=>{const nv={...v};delete nv[id];
        localStorage.setItem("inv_vis",JSON.stringify(nv));return nv;});

  }
  const [hidden,setHidden]=useState(()=>{try{return new Set(JSON.parse(localStorage.getItem("inv_h")||"[]"));}catch{return new Set();}});
  function saveH(s){localStorage.setItem("inv_h",JSON.stringify([...s]));setHidden(new Set(s));}
  function toggleH(c){const s=new Set(hidden);s.has(c)?s.delete(c):s.add(c);saveH(s);}
  function clearH(){saveH(new Set());}
  const [showHid,setShowHid]=useState(false);
  const [showOrderOnly,setShowOrderOnly]=useState(false);
  const [showSales,setShowSales]=useState(false);
  const [nMonth,setNMonth]=useState(3);
  const [fMaj,setFMaj]=useState('');
  const [fMid,setFMid]=useState('');
  const [cmpA,setCmpA]=useState("260331"),[cmpB,setCmpB]=useState("260409");
  const [cSub,setCSub]=useState(""),[cCd,setCCd]=useState(""),[cNm,setCNm]=useState("");
  const [msgs,setMsgs]=useState([{r:"ai",t:"재고 현황을 질문하세요.\n예: \"해타일 재고\", \"3*6 현황\", \"전월 감소 품목\""}]);
  const [qi,setQi]=useState(""),[busy,setBusy]=useState(false);
  const chatRef=useRef(null);
  useEffect(()=>{if(chatRef.current)chatRef.current.scrollTop=99999;},[msgs]);
  // 모바일에서 숨김 업데이트 시 동기화
  useEffect(()=>{
    function onHiddenUpdate(){
      try{setHidden(new Set(JSON.parse(localStorage.getItem("inv_h")||"[]")));}catch{}
    }
    window.addEventListener("inv_hidden_update",onHiddenUpdate);
    return()=>window.removeEventListener("inv_hidden_update",onHiddenUpdate);
  },[]);

  // BASE_DATES에 이미 있는 날짜는 새 컬럼을 만들지 않고 override로 처리
  const filteredExtra=useMemo(()=>extraDates.filter(e=>!BASE_DATES.includes(e.id)),[extraDates]);
  const overrideMap=useMemo(()=>Object.fromEntries(extraDates.filter(e=>BASE_DATES.includes(e.id)).map(e=>[e.id,e.data])),[extraDates]);
  const DATES=useMemo(()=>{
    const all=[...BASE_DATES.filter(d=>!hiddenBase.has(d)),...filteredExtra.map(e=>e.id)];
    return all.sort((a,b)=>a.localeCompare(b));
  },[filteredExtra,hiddenBase]);
  const DL=useMemo(()=>{
    const allD=[...BASE_DATES.filter(d=>!hiddenBase.has(d)),...filteredExtra.map(e=>e.id)].sort((a,b)=>a.localeCompare(b));
    const baseDLMap=Object.fromEntries(BASE_DATES.map((d,i)=>[d,BASE_DL[i]]));
    const extraDLMap=Object.fromEntries(filteredExtra.map(e=>[e.id,e.label]));
    return allD.map(d=>baseDLMap[d]||extraDLMap[d]||d);
  },[filteredExtra,hiddenBase]);

  const vIdx=useMemo(()=>DATES.map((d,i)=>vis[d]?i:null).filter(x=>x!=null),[vis,DATES.length]);

  const orderAlertMap=useMemo(()=>{
    const lastVi=vIdx[vIdx.length-1];
    if(lastVi==null)return{};
    const lastDateId=DATES[lastVi];
    const ly=2000+parseInt(lastDateId.slice(0,2)),lm=parseInt(lastDateId.slice(2,4))-1,ld2=parseInt(lastDateId.slice(4,6));
    const lms=new Date(ly,lm,ld2).getTime();
    let ref3i=-1,minD2=Infinity;
    DATES.forEach((d,i)=>{if(i===lastVi||!BASE_DATES.includes(d))return;const y2=2000+parseInt(d.slice(0,2)),m2=parseInt(d.slice(2,4))-1,d3=parseInt(d.slice(4,6));const ms=new Date(y2,m2,d3).getTime();const df=Math.abs(ms-(lms-90*864e5));if(ms<=lms&&df<minD2){minD2=df;ref3i=i;}});
    const grpMap={};
    ROWS.forEach(r=>{
      if(r.n.endsWith("※"))return;
      const key=r.s+"|"+r.base;
      if(!grpMap[key])grpMap[key]={cur:0,prev:0,codes:[]};
      grpMap[key].cur+=getQty(r,lastVi);
      if(ref3i>=0)grpMap[key].prev+=getQty(r,ref3i);
      grpMap[key].codes.push(r.c);
    });
    const result={};
    Object.values(grpMap).forEach(g=>{
      const sales90=Math.max(0,g.prev-g.cur);
      const dailyRate=sales90/90;
      const daysLeft=dailyRate>0?g.cur/dailyRate:Infinity;
      const alert=g.cur>0&&dailyRate>0&&daysLeft<=45;
      g.codes.forEach(c=>result[c]=alert);
    });
    return result;
  },[vIdx,DATES.length]);

  function getQty(row,di){
    // di = index in sorted DATES array
    const dateId=DATES[di];
    if(!dateId)return 0;
    const ov=overrideMap[dateId];
    if(ov) return ov[row.c]||0;
    const baseIdx=BASE_DATES.indexOf(dateId);
    if(baseIdx>=0) return row.d[baseIdx]||0;
    const ed=filteredExtra.find(e=>e.id===dateId);
    return ed?ed.data[row.c]||0:0;
  }

  const rows=useMemo(()=>{
    let r=ROWS;
    if(fSub)r=r.filter(x=>x.s===fSub);
    if(fCd)r=r.filter(x=>x.c.includes(fCd));
    if(fNm)r=r.filter(x=>x.n.toLowerCase().includes(fNm.toLowerCase()));
    if(fMaj)r=r.filter(x=>SC_META[x.si]&&SC_META[x.si].g===fMaj);
    if(fMid)r=r.filter(x=>SC_META[x.si]&&SC_META[x.si].m===fMid);
    if(!showHid)r=r.filter(x=>!hidden.has(x.c));
    // 비숫자 코드(P/S/C 등 서비스 항목) 제외
    r=r.filter(x=>/^\d+$/.test(x.c));
    if(showOrderOnly)r=r.filter(x=>!!orderAlertMap[x.c]);
    // 신규 품목(localStorage) 추가 - 활성 필터를 동일하게 적용
    const existCodes=new Set(ROWS.map(x=>x.c));
    const shownCodes=new Set(r.map(x=>x.c));
    newItems.filter(x=>!existCodes.has(x.code)&&!shownCodes.has(x.code)).forEach(x=>{
      const sub=x.sub||"신규";
      if(fSub&&sub!==fSub)return;
      if(fCd&&!x.code.includes(fCd))return;
      if(fNm&&!x.nm.toLowerCase().includes(fNm.toLowerCase()))return;
      const si2=SC.indexOf(sub);
      if(fMaj&&!(si2>=0&&SC_META[si2]&&SC_META[si2].g===fMaj))return;
      if(fMid&&!(si2>=0&&SC_META[si2]&&SC_META[si2].m===fMid))return;
      if(!/^\d+$/.test(x.code))return;
      if(!showHid&&hidden.has(x.code))return;
      r.push({si:si2,s:sub,c:x.code,n:x.nm,base:x.nm.replace(/\s*LOT:.*$/i,"").trim(),sz:"",d:Array(BASE_DATES.length).fill(0)});
    });
    r.sort((a,b)=>{
      if(a.s!==b.s)return a.s.localeCompare(b.s,'ko');
      const sa=a.base.match(/^(\d+)\*(\d+)/),sb2=b.base.match(/^(\d+)\*(\d+)/);
      const [aw1,aw2]=(sa?[+sa[1],+sa[2]]:[9999,9999]);
      const [bw1,bw2]=(sb2?[+sb2[1],+sb2[2]]:[9999,9999]);
      if(aw1!==bw1)return aw1-bw1;if(aw2!==bw2)return aw2-bw2;
      if(a.base!==b.base)return a.base.localeCompare(b.base,'ko');
      return a.c.localeCompare(b.c);
    });
    return r.map((row,i,a)=>({...row,ns:i===0||row.s!==a[i-1].s,nb:i===0||row.base!==a[i-1].base||row.s!==a[i-1].s}));
  },[fSub,fCd,fNm,fMaj,fMid,hidden,showHid,showOrderOnly,DATES.length,newItems,orderAlertMap]);

  const tots=useMemo(()=>DATES.map((_,i)=>rows.reduce((a,r)=>a+getQty(r,i),0)),[rows,DATES.length,extraDates]);

  const cmpRows=useMemo(()=>{
    const ai=DATES.indexOf(cmpA),bi=DATES.indexOf(cmpB);
    let r=ROWS.map(r=>({...r,qa:getQty(r,ai),qb:getQty(r,bi),diff:getQty(r,bi)-getQty(r,ai)})).filter(r=>r.diff!==0).sort((a,b)=>Math.abs(b.diff)-Math.abs(a.diff));
    if(cSub)r=r.filter(x=>x.s===cSub);if(cCd)r=r.filter(x=>x.c.includes(cCd));if(cNm)r=r.filter(x=>x.n.toLowerCase().includes(cNm.toLowerCase()));
    return r;
  },[cmpA,cmpB,cSub,cCd,cNm,DATES.length,extraDates]);

  function cellStates(r){
    let inDrop=false;
    return vIdx.map((vi,pos)=>{
      const q=getQty(r,vi),pq=pos>0?getQty(r,vIdx[pos-1]):null;
      if(q===0)return"zero";
      if(pq==null||pq===0)return"normal";
      if(inDrop){if(q>=100){inDrop=false;return"normal";}return"drop";}
      if(q<=pq*0.5){inDrop=true;return"drop";}
      if(q>pq)return"up";
      return"normal";
    });
  }

  const initW=()=>[28,70,290,...Array(Math.max(9,DATES.length+2)).fill(70)];
  const [colW,setColW]=useState(initW);
  const colRef=useRef(colW);
  useEffect(()=>{colRef.current=colW;},[colW]);
  function startResize(ci,e){
    e.preventDefault();const sx=e.clientX,sw=colRef.current[ci]||70;
    const rh=e.currentTarget;rh.classList.add("drag");
    function mv(e){const nw=Math.max(36,sw+e.clientX-sx);const nx=[...colRef.current];nx[ci]=nw;colRef.current=nx;document.querySelectorAll(".icc"+ci).forEach(el=>el.style.width=nw+"px");}
    function up(){rh.classList.remove("drag");setColW([...colRef.current]);document.removeEventListener("mousemove",mv);document.removeEventListener("mouseup",up);}
    document.addEventListener("mousemove",mv);document.addEventListener("mouseup",up);
  }

function handleItemUpdate(e){
    const file=e.target.files[0];if(!file)return;
    const reader=new FileReader();
    reader.onload=ev=>{
      try{
        const wb=XLSX.read(ev.target.result,{type:"array"});
        const ws=wb.Sheets[wb.SheetNames[0]];
        const jd=XLSX.utils.sheet_to_json(ws,{header:1,defval:""});
        // 헤더 행 찾기
        let hRow=-1,subCol=-1,codeCol=-1,nmCol=-1;
        for(let i=0;i<Math.min(5,jd.length);i++){
          const row=jd[i].map(v=>String(v).replace(/\s/g,"").toLowerCase());
          const sc=row.findIndex(v=>v.includes("소분류")||v.includes("subcategory"));
          const cc=row.findIndex(v=>v.includes("품목코드")||v.includes("품번")||v.includes("code"));
          const nc=row.findIndex(v=>v.includes("품명")||v.includes("name")||v.includes("품목명"));
          if(cc>=0&&nc>=0){hRow=i;subCol=sc;codeCol=cc;nmCol=nc;break;}
        }
        if(hRow<0){alert("품목코드/품명 열을 찾을 수 없습니다");e.target.value="";return;}
        // 신규/변경 품목 추출
        const newItems=[];
        const existCodes=new Set(CODES);
        for(let i=hRow+1;i<jd.length;i++){
          const row=jd[i];
          const code=String(row[codeCol]||"").trim();
          const nm=String(row[nmCol]||"").trim();
          const sub=subCol>=0?String(row[subCol]||"").trim():"";
          if(!code||!nm||code==="합계")continue;
          if(!existCodes.has(code)){
            newItems.push({code,nm,sub});
          }
        }
        if(newItems.length===0){
          alert("신규 품목이 없습니다.\n(기존 품목코드 업데이트는 재고 파일 업로드로 진행하세요)");
          e.target.value="";return;
        }
        // localStorage에 신규 품목 저장
        const saved=JSON.parse(localStorage.getItem("inv_new_items")||"[]");
        const merged=[...saved,...newItems.filter(x=>!saved.find(s=>s.code===x.code))];
        localStorage.setItem("inv_new_items",JSON.stringify(merged));
        setNewItems(merged);
        alert("신규 품목 "+newItems.length+"개 추가됨\n(재고 파일 업로드 시 자동 반영)");
      }catch(err){alert("오류: "+err.message);}
      e.target.value="";
    };
    reader.readAsArrayBuffer(file);
  }

  function handleUpload(e){
    const file=e.target.files[0];if(!file)return;
    const name=file.name;
    const isoM=name.match(/20([2-9][0-9])-([01][0-9])-([0-3][0-9])/);
    const ymdM=name.match(/(?:^|[^0-9])(2[0-9][01][0-9][0-3][0-9])(?:[^0-9]|$)/);
    const rawId=isoM?(isoM[1]+isoM[2]+isoM[3]):ymdM?ymdM[1]:"";
    if(!rawId){
      const manual=prompt("파일명에서 날짜를 찾을 수 없습니다.\nYYMMDD 형식으로 날짜를 입력하세요 (예: 260510):");
      if(!manual){e.target.value="";return;}
      return handleUploadWithId(file,manual.trim());
    }
    handleUploadWithId(file,rawId);
  }
  function handleUploadWithId(file,rawId){
    const y="20"+rawId.slice(0,2),mo=rawId.slice(2,4),d=rawId.slice(4,6);
    const label="'"+y.slice(2)+"."+mo+"."+d;const reader=new FileReader();
    reader.onload=ev=>{
      try{
        const wb=XLSX.read(ev.target.result,{type:"array"});
        const ws=wb.Sheets[wb.SheetNames[0]];
        const jd=XLSX.utils.sheet_to_json(ws,{header:1,defval:""});
        let hRow=-1,cc=-1,qc=-1;
        for(let i=0;i<Math.min(5,jd.length);i++){
          const row=jd[i].map(v=>String(v).replace(/\s/g,"").toLowerCase());
          const ci=row.findIndex(v=>v.includes("품번")||v.includes("품목코드")||v.includes("code"));
          const qi=row.findIndex(v=>v.includes("현재고")||v.includes("재고")||v.includes("qty")||v.includes("기말"));
          if(ci>=0&&qi>=0){hRow=i;cc=ci;qc=qi;break;}
        }
        if(hRow<0){alert("컬럼을 찾을 수 없습니다");return;}
        const data={};
        for(let i=hRow+1;i<jd.length;i++){
          const row=jd[i];const code=String(row[cc]||"").trim();const qty=parseFloat(row[qc])||0;
          if(code&&code!=="합계"&&qty>0)data[code]=(data[code]||0)+qty;
        }
        const cnt=Object.keys(data).length;
        if(!cnt){alert("데이터 없음");return;}
        const newEntry={id:rawId,label,data};
        const updated=[...extraDates.filter(x=>x.id!==rawId),newEntry].sort((a,b)=>a.id.localeCompare(b.id));
        saveExtra(updated);

  function analyze(q){
    const ql=q.toLowerCase();
    const DK=Object.fromEntries(DATES.map((d,i)=>[d,DL[i].replace("'","")]));
    const ms=SC.filter(s=>{const sl=s.toLowerCase();const nm=sl.includes(")")?sl.slice(sl.indexOf(")")+1):sl;return ql.includes(sl)||ql.includes(nm.trim());});
    if(ms.length){
      const sc=ms[0],items=ROWS.filter(r=>r.s===sc);
      if(!items.length)return sc+" 없음";
      const tt=DATES.map((_,i)=>items.reduce((a,r)=>a+getQty(r,i),0));
      return "["+sc+"] "+items.length+"품목\n"+DATES.map((d,i)=>DK[d]+": "+tt[i].toLocaleString()).join(" | ")+"\n"+
        tt.slice(1).map((v,i)=>{const d=v-tt[i];return d===0?"":DK[DATES[i]]+"→"+DK[DATES[i+1]]+": "+(d>0?"+":"")+d.toLocaleString();}).filter(Boolean).join(", ");
    }
    if(ql.includes("감소")||ql.includes("하락")){
      const li=DATES.length-1,pi=li-1;
      const drops=ROWS.filter(r=>getQty(r,pi)>0&&getQty(r,li)>0&&getQty(r,li)<=getQty(r,pi)*0.5).sort((a,b)=>getQty(a,li)/getQty(a,pi)-getQty(b,li)/getQty(b,pi)).slice(0,10);
      return drops.length===0?"없음":DL[pi]+"→"+DL[li]+" 50%+ 감소:\n"+drops.map(r=>"• "+r.n+"("+r.s+"): "+getQty(r,pi)+"→"+getQty(r,li)).join("\n");
    }
    if(ql.includes("증가")||ql.includes("입고")){
      const li=DATES.length-1,pi=li-1;
      const ups=ROWS.filter(r=>getQty(r,li)>getQty(r,pi)&&getQty(r,li)>=100).sort((a,b)=>(getQty(b,li)-getQty(b,pi))-(getQty(a,li)-getQty(a,pi))).slice(0,10);
      return ups.length===0?"없음":"100박스+ 증가:\n"+ups.map(r=>"• "+r.n+": +"+(getQty(r,li)-getQty(r,li-1)).toLocaleString()).join("\n");
    }
    const szm=ql.match(/(\d+)\*(\d+)/);
    if(szm){const sz=szm[0],items=ROWS.filter(r=>r.sz===sz);if(!items.length)return sz+" 없음";const tt=DATES.map((_,i)=>items.reduce((a,r)=>a+getQty(r,i),0));return "["+sz+"] "+items.length+"품목\n"+DATES.map((d,i)=>DK[d]+": "+tt[i].toLocaleString()).join(" | ");}
    return DATES.map((d,i)=>DK[d]+": "+ROWS.reduce((a,r)=>a+getQty(r,i),0).toLocaleString()).join("\n");
  }
